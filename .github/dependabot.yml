version: 2
updates:
  # The workflow in .github/workflows/build.yml SHA-pins every action
  # (e.g. actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4).
  # Dependabot understands SHA-pinned references — it will raise a PR
  # bumping the SHA whenever the tag in the trailing comment publishes
  # a new release. Each bump is then a reviewable diff rather than
  # silent drift, which is the whole point of SHA pinning.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
