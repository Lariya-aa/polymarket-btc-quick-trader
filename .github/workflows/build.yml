name: Build releases

# Triggers:
#   - push a vX.Y.Z tag  → build mac+windows artifacts, then a separate
#     release job downloads them and pushes to the GitHub release.
#   - manual run from Actions tab (workflow_dispatch) → only the build
#     jobs run; nothing is pushed to releases.
#
# Outputs as workflow artifacts (and release assets on tags):
#   PolyMarketTrader-macos.dmg
#   PolyMarketTrader-windows.zip   (zip of the onedir folder)
#
# Security posture:
#   - All actions pinned to commit SHAs (not mutable @vN tags) so a
#     compromised action publisher cannot silently inject code. The
#     comment after each `uses:` line records the tag the SHA was
#     resolved from for human readability. .github/dependabot.yml
#     bumps these on each upstream release.
#   - Default workflow permissions: contents: read.
#   - Build jobs (macos/windows) RUN with contents: read — they have
#     no capability to push to the repo or to a release.
#   - The release-publish job runs ONLY on a tag push, with
#     contents: write scoped at the job level (the only valid place
#     for it in GitHub Actions; step-level permissions are not
#     supported and silently dropped to the workflow default).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
      - name: Install build deps
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements-dev.txt pyinstaller
      - name: Run pure-function tests
        run: .venv/bin/pytest tests/ -q
      - name: Build .app + .dmg
        run: ./packaging/build_macos.sh
      - name: Rename for upload
        run: mv dist/PolyMarketTrader.dmg dist/PolyMarketTrader-macos.dmg
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: PolyMarketTrader-macos
          path: dist/PolyMarketTrader-macos.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
      - name: Install build deps
        shell: pwsh
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          .venv\Scripts\pip install -r requirements-dev.txt pyinstaller
      - name: Run pure-function tests
        shell: pwsh
        run: .venv\Scripts\pytest tests\ -q
      - name: Build .exe
        shell: pwsh
        run: .\packaging\build_windows.ps1
      - name: Zip onedir folder
        shell: pwsh
        run: |
          Compress-Archive -Path dist\PolyMarketTrader\* -DestinationPath dist\PolyMarketTrader-windows.zip
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: PolyMarketTrader-windows
          path: dist/PolyMarketTrader-windows.zip

  release:
    # Tag-only. Downloads the artifacts from build-macos and build-windows
    # and uploads them to the GitHub release. This is the ONLY job with
    # contents:write — the build jobs above cannot push.
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: PolyMarketTrader-macos
          path: dist
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: PolyMarketTrader-windows
          path: dist
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: |
            dist/PolyMarketTrader-macos.dmg
            dist/PolyMarketTrader-windows.zip
