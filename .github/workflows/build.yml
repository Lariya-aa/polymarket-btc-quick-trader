name: Build releases

# Triggers:
#   - push a vX.Y.Z tag  → build mac+windows artifacts, attach to release
#   - manual run from Actions tab (workflow_dispatch)
#
# Outputs as workflow artifacts (and release assets on tags):
#   PolyMarketTrader-macos.dmg
#   PolyMarketTrader-windows.zip   (zip of the onedir folder)
#
# Security posture:
#   - All actions are pinned to commit SHAs (not mutable @vN tags) so a
#     compromised action publisher cannot silently inject code. The
#     comment after each `uses:` line records the tag the SHA was
#     resolved from for human readability.
#   - Default workflow `permissions: contents: read` — minimum read so
#     the build jobs can checkout the repo and nothing more.
#   - `contents: write` is granted ONLY to the release-upload step,
#     not to the entire workflow. A compromised build step therefore
#     cannot push fake release assets.
#   - .github/dependabot.yml watches these SHA references and raises
#     PRs when new versions ship.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Default: read-only. The release-upload step below escalates to
# contents: write via a step-level permissions block.
permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        # Note: the commit the v4 lightweight tag pointed at when we
        # pinned. Dependabot will raise a PR with the new SHA on update.

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements-dev.txt pyinstaller

      - name: Run pure-function tests
        run: .venv/bin/pytest tests/ -q

      - name: Build .app + .dmg
        run: ./packaging/build_macos.sh

      - name: Rename for upload
        run: mv dist/PolyMarketTrader.dmg dist/PolyMarketTrader-macos.dmg

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: PolyMarketTrader-macos
          path: dist/PolyMarketTrader-macos.dmg

      - name: Attach to release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        permissions:
          contents: write   # scoped here — only this step can push release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: dist/PolyMarketTrader-macos.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install build deps
        shell: pwsh
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          .venv\Scripts\pip install -r requirements-dev.txt pyinstaller

      - name: Run pure-function tests
        shell: pwsh
        run: .venv\Scripts\pytest tests\ -q

      - name: Build .exe
        shell: pwsh
        run: .\packaging\build_windows.ps1

      - name: Zip onedir folder
        shell: pwsh
        run: |
          Compress-Archive -Path dist\PolyMarketTrader\* -DestinationPath dist\PolyMarketTrader-windows.zip

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: PolyMarketTrader-windows
          path: dist/PolyMarketTrader-windows.zip

      - name: Attach to release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        permissions:
          contents: write   # scoped here — only this step can push release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: dist/PolyMarketTrader-windows.zip
